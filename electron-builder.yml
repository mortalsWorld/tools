appId: com.devtools.app
productName: DevTools
directories:
  output: release
files:
  - "dist/**/*"
  - "dist-electron/**/*"
  - "package.json"
asar: true
compression: maximum
npmRebuild: false
afterPack: "scripts/afterPack.js"
win:
  target:
    - nsis
    - portable
  icon: public/icon.ico
mac:
  target:
    - dmg
    - zip
linux:
  target:
    - AppImage
    - deb