<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1929;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#132F4C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E4976;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)" />
  <!-- 电路板纹路 -->
  <line x1="32" y1="64" x2="64" y2="64" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="64" y1="64" x2="64" y2="96" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="64" y1="96" x2="96" y2="96" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="192" y1="64" x2="224" y2="64" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="192" y1="64" x2="192" y2="96" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="160" y1="96" x2="192" y2="96" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="32" y1="192" x2="64" y2="192" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="64" y1="160" x2="64" y2="192" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="192" y1="192" x2="224" y2="192" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <line x1="192" y1="160" x2="192" y2="192" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  <!-- 电路节点 -->
  <circle cx="32" cy="64" r="5" fill="#00D9FF" opacity="0.5"/>
  <circle cx="96" cy="96" r="5" fill="#00D9FF" opacity="0.5"/>
  <circle cx="224" cy="64" r="5" fill="#00D9FF" opacity="0.5"/>
  <circle cx="160" cy="96" r="5" fill="#00D9FF" opacity="0.5"/>
  <circle cx="32" cy="192" r="5" fill="#00D9FF" opacity="0.5"/>
  <circle cx="224" cy="192" r="5" fill="#00D9FF" opacity="0.5"/>
  <!-- 中心六边形 -->
  <polygon points="128,60 188,94 188,162 128,196 68,162 68,94" fill="none" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)"/>
  <polygon points="128,74 176,100 176,156 128,182 80,156 80,100" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.6"/>
  <!-- 内部符号 -->
  <circle cx="128" cy="128" r="32" fill="none" stroke="url(#accentGrad)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="22" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <!-- 中心代码符号 -->
  <text x="128" y="138" text-anchor="middle" fill="#00D9FF" font-size="28" font-family="monospace" font-weight="bold" filter="url(#glow)">&lt;/&gt;</text>
  <!-- 四角装饰 -->
  <path d="M 40 40 L 60 40 L 60 50" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 216 40 L 196 40 L 196 50" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 40 216 L 60 216 L 60 206" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 216 216 L 196 216 L 196 206" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
</svg>